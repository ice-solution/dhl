# Apache2 virtual host: dhl.brandactivation.hk
#
# Deploy:
#   sudo cp dhl.conf /etc/apache2/sites-available/dhl.conf
#   sudo a2ensite dhl.conf
#   sudo a2enmod proxy proxy_http headers remoteip
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2
#
# Cloudflare SSL mode: Flexible (origin HTTP port 80 only)
#
# App path: /var/www/dhl-super-stars
# Node/Express port: must match .env PORT (default 3199)
#
# Static files (/css, /images) are served by Express from public/
# Do NOT use Apache Alias - avoids 404 conflicts with ProxyPass

<VirtualHost *:80>
    ServerName dhl.brandactivation.hk
    ServerAdmin webmaster@brandactivation.hk

    ErrorLog  ${APACHE_LOG_DIR}/dhl.brandactivation.hk.error.log
    CustomLog ${APACHE_LOG_DIR}/dhl.brandactivation.hk.access.log combined

    # Cloudflare real client IP
    RemoteIPHeader CF-Connecting-IP
    RemoteIPTrustedProxy 103.21.244.0/22
    RemoteIPTrustedProxy 103.22.200.0/22
    RemoteIPTrustedProxy 103.31.4.0/22
    RemoteIPTrustedProxy 104.16.0.0/13
    RemoteIPTrustedProxy 104.24.0.0/14
    RemoteIPTrustedProxy 108.162.192.0/18
    RemoteIPTrustedProxy 131.0.72.0/22
    RemoteIPTrustedProxy 141.101.64.0/18
    RemoteIPTrustedProxy 162.158.0.0/15
    RemoteIPTrustedProxy 172.64.0.0/13
    RemoteIPTrustedProxy 173.245.48.0/20
    RemoteIPTrustedProxy 188.114.96.0/20
    RemoteIPTrustedProxy 190.93.240.0/20
    RemoteIPTrustedProxy 197.234.240.0/22
    RemoteIPTrustedProxy 198.41.128.0/17
    RemoteIPTrustedProxy 2400:cb00::/32
    RemoteIPTrustedProxy 2606:4700::/32
    RemoteIPTrustedProxy 2803:f800::/32
    RemoteIPTrustedProxy 2405:b500::/32
    RemoteIPTrustedProxy 2405:8100::/32
    RemoteIPTrustedProxy 2a06:98c0::/29
    RemoteIPTrustedProxy 2c0f:f248::/32

    ProxyPreserveHost On
    ProxyRequests Off

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # All requests (including /css, /images) -> Express
    ProxyPass        / http://127.0.0.1:3199/
    ProxyPassReverse / http://127.0.0.1:3199/

    LimitRequestBody 20971520
</VirtualHost>
